services:
  db:
    image: postgres:18-alpine
    container_name: dashboard-postgres
    restart: always
    environment:
      POSTGRES_USER: dashboard_admin
      POSTGRES_PASSWORD: local_password_123
      POSTGRES_DB: dashboard_db
    ports:
      - "5436:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
